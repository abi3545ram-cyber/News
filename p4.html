  recordAnswer(catIdx,ok){const s=this.stats();s.answered++;if(ok)s.correct++;const k=typeof catIdx==='number'?QUIZ_CATS[catIdx]:String(catIdx);s.byCat[k]=s.byCat[k]||[0,0];s.byCat[k][1]++;if(ok)s.byCat[k][0]++;this.save(s);}
};
const OTDB_CATS=[["","Any topic"],["9","General"],["17","Science"],["18","Computers"],["22","Geography"],["23","History"],["21","Sport"],["11","Film"]];
function quizSetupHTML(){
  const c=Quiz.cfg;const s=Quiz.stats();
  const acc=s.answered?Math.round(100*s.correct/s.answered):0;
  const catChips=c.mode==='bank'
    ?['<button class="chip'+(c.cat===-1?' on':'')+'" data-qcat="-1">All topics</button>'].concat(QUIZ_CATS.map((n,i)=>'<button class="chip'+(c.cat===i?' on':'')+'" data-qcat="'+i+'">'+n+'</button>')).join('')
    :OTDB_CATS.map(o=>'<button class="chip'+(String(c.cat)===o[0]?' on':'')+'" data-qcat="'+o[0]+'">'+o[1]+'</button>').join('');
  return '<h2 class="section">General knowledge quiz</h2>'+
  '<div class="card">'+
    '<div class="setup-block"><div class="lbl">Source</div><div class="chiprow" style="margin:0">'+
      '<button class="chip'+(c.mode==='bank'?' on':'')+'" data-qmode="bank">Cortex bank · '+QUIZ.length+' questions</button>'+
      '<button class="chip'+(c.mode==='online'?' on':'')+'" data-qmode="online">Online · endless (Open Trivia DB)</button></div></div>'+
    '<div class="setup-block"><div class="lbl">Topic</div><div class="chiprow" style="margin:0">'+catChips+'</div></div>'+
    '<div class="setup-block"><div class="lbl">Difficulty</div><div class="chiprow" style="margin:0">'+
      [['-1','Mixed'],['0','Easy'],['1','Medium'],['2','Hard']].map(d=>'<button class="chip'+(String(c.diff)===d[0]?' on':'')+'" data-qdiff="'+d[0]+'">'+d[1]+'</button>').join('')+'</div></div>'+
    '<div class="setup-block"><div class="lbl">Length</div><div class="chiprow" style="margin:0">'+
      [5,10,15].map(n=>'<button class="chip'+(c.len===n?' on':'')+'" data-qlen="'+n+'">'+n+' questions</button>').join('')+'</div></div>'+
    '<button class="btn primary" id="quizStart">Start quiz</button>'+
  '</div>'+
  '<div class="card" style="margin-top:16px"><div class="card-head"><span class="eyebrow">Your all-time stats</span>'+
    (s.answered?'<button class="btn small" id="quizReset">Reset</button>':'')+'</div>'+
    '<div class="stat-tiles">'+
      '<div class="stat-tile"><div class="v">'+s.plays+'</div><div class="l">Rounds</div></div>'+
      '<div class="stat-tile"><div class="v">'+s.best+'%</div><div class="l">Best round</div></div>'+
      '<div class="stat-tile"><div class="v">'+acc+'%</div><div class="l">Accuracy</div></div>'+
      '<div class="stat-tile"><div class="v">'+s.answered+'</div><div class="l">Answered</div></div></div>'+
    (Object.keys(s.byCat).length?'<hr class="divider">'+Object.entries(s.byCat).map(e=>{
      const p=e[1][1]?Math.round(100*e[1][0]/e[1][1]):0;
      return '<div class="catbar"><span class="nm">'+esc(e[0])+'</span><div class="track"><i style="width:'+p+'%"></i></div><span class="pc">'+p+'%</span></div>';
    }).join(''):'<p class="muted">Answer questions to build up your category breakdown.</p>')+
  '</div>';
}
function renderQuizSetup(){
  const sh=$('#quizShell');sh.innerHTML=quizSetupHTML();
  $$('[data-qmode]',sh).forEach(b=>b.onclick=()=>{Quiz.cfg.mode=b.dataset.qmode;Quiz.cfg.cat=Quiz.cfg.mode==='bank'?-1:'';renderQuizSetup();});
  $$('[data-qcat]',sh).forEach(b=>b.onclick=()=>{Quiz.cfg.cat=Quiz.cfg.mode==='bank'?+b.dataset.qcat:b.dataset.qcat;renderQuizSetup();});
  $$('[data-qdiff]',sh).forEach(b=>b.onclick=()=>{Quiz.cfg.diff=+b.dataset.qdiff;renderQuizSetup();});
  $$('[data-qlen]',sh).forEach(b=>b.onclick=()=>{Quiz.cfg.len=+b.dataset.qlen;renderQuizSetup();});
  $('#quizStart').onclick=startQuiz;
  const r=$('#quizReset');if(r)r.onclick=()=>{if(confirm('Reset all quiz stats?')){store.set('qstats',{plays:0,best:0,answered:0,correct:0,byCat:{}});renderQuizSetup();}};
}
async function startQuiz(){
  const c=Quiz.cfg;const sh=$('#quizShell');
  let qs=[];
  if(c.mode==='bank'){
    let pool=QUIZ.filter(q=>(c.cat===-1||q[0]===c.cat)&&(c.diff===-1||q[1]===c.diff));
    if(pool.length<3)pool=QUIZ.filter(q=>c.cat===-1||q[0]===c.cat);
    qs=shuffle(pool).slice(0,c.len).map(q=>{
      const order=shuffle([0,1,2,3]);
      return{q:q[2],opts:order.map(i=>q[3][i]),ans:order.indexOf(q[4]),cat:QUIZ_CATS[q[0]],catIdx:q[0],expl:q[5]};
    });
    if(!qs.length){toast('No questions match those filters');return;}
    playQuiz(qs);
  }else{
    sh.innerHTML='<div class="card" style="text-align:center;padding:50px"><span class="spin"></span><p class="muted" style="margin-top:12px">Fetching fresh questions from Open Trivia DB…</p></div>';
    try{
      let url='https://opentdb.com/api.php?amount='+c.len+'&type=multiple';
      if(c.cat)url+='&category='+c.cat;
      if(c.diff!==-1)url+='&difficulty='+['easy','medium','hard'][c.diff];
      const r=looseJSON(await webGet(url));
      if(!r.results||!r.results.length)throw new Error('No questions returned — try different filters');
      qs=r.results.map(it=>{
        const correct=decodeEnt(it.correct_answer);
        const opts=shuffle([correct].concat(it.incorrect_answers.map(decodeEnt)));
        return{q:decodeEnt(it.question),opts,ans:opts.indexOf(correct),cat:decodeEnt(it.category),catIdx:'Online',expl:''};
      });
      playQuiz(qs);
    }catch(e){
      sh.innerHTML='<div class="err"><span>Couldn’t reach the trivia service ('+esc(e.message)+').</span><button class="btn small" id="qRetry">Back</button></div>';
      $('#qRetry').onclick=renderQuizSetup;
    }
  }
}
function playQuiz(qs){
  Quiz.cur={qs,i:0,score:0};
  renderQuestion();
}
function renderQuestion(){
  const st=Quiz.cur;const q=st.qs[st.i];const sh=$('#quizShell');
  sh.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center"><span class="tiny" style="font-weight:700">Question '+(st.i+1)+' of '+st.qs.length+'</span><span class="badge plain">'+esc(q.cat)+'</span></div>'+
  '<div class="qprog"><i style="width:'+Math.round(100*st.i/st.qs.length)+'%"></i></div>'+
  '<div class="qtext">'+esc(q.q)+'</div>'+
  '<div class="opts">'+q.opts.map((o,i)=>'<button class="opt" data-i="'+i+'"><span class="letter">'+'ABCD'[i]+'</span><span>'+esc(o)+'</span></button>').join('')+'</div>'+
  '<div class="expl" id="qExpl"></div>'+
  '<div class="quiz-foot"><button class="btn small" id="qQuit">Quit</button><button class="btn primary" id="qNext" style="visibility:hidden">'+(st.i+1===st.qs.length?'See results':'Next')+'</button></div>';
  $('#qQuit').onclick=renderQuizSetup;
  $$('#quizShell .opt').forEach(b=>b.onclick=()=>{
    const pick=+b.dataset.i;const ok=pick===q.ans;
    if(ok)st.score++;
    Quiz.recordAnswer(q.catIdx,ok);
    $$('#quizShell .opt').forEach(o=>{o.disabled=true;const i=+o.dataset.i;if(i===q.ans)o.classList.add('correct');else if(i===pick)o.classList.add('wrong');});
    const ex=$('#qExpl');
    ex.style.display='block';
    ex.innerHTML=(ok?'<b>Correct.</b> ':'<b>Not quite — it was '+esc(q.opts[q.ans])+'.</b> ')+esc(q.expl||'');
    $('#qNext').style.visibility='visible';
    $('#qNext').onclick=()=>{st.i++;st.i<st.qs.length?renderQuestion():renderResults();};
  });
}
function renderResults(){
  const st=Quiz.cur;const pct=Math.round(100*st.score/st.qs.length);
  const s=Quiz.stats();s.plays++;if(pct>s.best)s.best=pct;Quiz.save(s);
  const grade=pct>=90?'Outstanding. Genuinely sharp.':pct>=70?'Strong round — nicely done.':pct>=50?'Solid — the rematch beckons.':'Warming up. Run it back.';
  $('#quizShell').innerHTML='<div class="card" style="text-align:center;padding:40px 24px">'+
    '<div class="eyebrow">Round complete</div>'+
    '<div class="score-big">'+st.score+'<span style="font-size:26px;color:var(--ink3)">/'+st.qs.length+'</span></div>'+
    '<p style="font-family:var(--serif);font-size:18px;margin:8px 0 2px">'+pct+'% — '+grade+'</p>'+
    '<p class="tiny">Best round: '+s.best+'% · Rounds played: '+s.plays+'</p>'+
    '<div style="display:flex;gap:10px;justify-content:center;margin-top:20px">'+
    '<button class="btn primary" id="qAgain">Play again</button><button class="btn" id="qBack">Change settings</button></div></div>';
  $('#qAgain').onclick=startQuiz;$('#qBack').onclick=renderQuizSetup;
}
function initQuiz(){renderQuizSetup();}

/* ================= WORDS MODULE ================= */
let wordFilter='all';
function masteredSet(){return new Set(store.get('words',{m:[]}).m);}
function toggleMastered(i){const w=store.get('words',{m:[]});const ix=w.m.indexOf(i);ix>=0?w.m.splice(ix,1):w.m.push(i);store.set('words',w);renderWordList();renderWordProgress();}
function renderWordProgress(){const m=masteredSet();const p=Math.round(100*m.size/WORDS.length);$('#wordsProgTxt').textContent=m.size+' / '+WORDS.length+' mastered';$('#wordsProgBar').style.width=p+'%';}
function renderWordList(){
  const m=masteredSet();const q=($('#wordSearch').value||'').toLowerCase();
  const rows=WORDS.map((w,i)=>({w,i})).filter(x=>{
    if(wordFilter==='learning'&&m.has(x.i))return false;
    if(wordFilter==='mastered'&&!m.has(x.i))return false;
    if(wordFilter==='cs'&&x.w[4]!==0)return false;
    if(q&&!(x.w[0]+' '+x.w[2]).toLowerCase().includes(q))return false;
    return true;
  });
  $('#wordList').innerHTML=rows.length?rows.map(x=>{
    const done=m.has(x.i);
    return '<div class="word-row"><div><h3>'+esc(x.w[0])+'<span class="pos">'+esc(x.w[1])+'</span> <span class="badge '+(x.w[4]===0?'blue':x.w[4]===1?'violet':'plain')+'">'+WORD_TAGS[x.w[4]]+'</span></h3>'+
    '<p>'+esc(x.w[2])+'</p><div class="ex">“'+esc(x.w[3])+'”</div></div>'+
    '<button class="btn small mastered-btn'+(done?' done':'')+'" data-wi="'+x.i+'">'+(done?'Mastered ✓':'Mark mastered')+'</button></div>';
  }).join(''):'<p class="muted" style="padding:18px 0">Nothing here — adjust the filter.</p>';
  $$('#wordList .mastered-btn').forEach(b=>b.onclick=()=>toggleMastered(+b.dataset.wi));
}
function startFlashcards(){
  const m=masteredSet();
  let pool=WORDS.map((w,i)=>({w,i})).filter(x=>!m.has(x.i));
  if(!pool.length)pool=WORDS.map((w,i)=>({w,i}));
  const deck=shuffle(pool).slice(0,12);
  let i=0,knew=0;
  $('#wordListArea').style.display='none';const fa=$('#flashArea');fa.style.display='block';
  function card(){
    if(i>=deck.length){
      fa.innerHTML='<div class="flash"><div class="flash-card"><div class="eyebrow green">Session complete</div><div class="flash-word">'+knew+' / '+deck.length+'</div><p class="muted">marked as known this round</p></div><button class="btn primary" id="fcDone">Back to vault</button></div>';
      $('#fcDone').onclick=endFlash;return;
    }
    const x=deck[i];
    fa.innerHTML='<div class="flash"><p class="tiny" style="font-weight:700">Card '+(i+1)+' of '+deck.length+'</p>'+
    '<div class="flash-card"><span class="badge '+(x.w[4]===0?'blue':x.w[4]===1?'violet':'plain')+'">'+WORD_TAGS[x.w[4]]+'</span>'+
    '<div class="flash-word">'+esc(x.w[0])+'</div><div class="wod-pos">'+esc(x.w[1])+'</div><div id="fcBack" style="display:none"><p style="font-size:15.5px;margin-bottom:8px">'+esc(x.w[2])+'</p><p class="muted" style="font-style:italic">“'+esc(x.w[3])+'”</p></div></div>'+
    '<div style="display:flex;gap:10px;justify-content:center" id="fcBtns"><button class="btn primary" id="fcReveal">Reveal</button><button class="btn" id="fcSkip">End session</button></div></div>';
    $('#fcSkip').onclick=endFlash;
    $('#fcReveal').onclick=()=>{
      $('#fcBack').style.display='block';
      $('#fcBtns').innerHTML='<button class="btn primary" id="fcKnew">Knew it</button><button class="btn" id="fcLearn">Still learning</button>';
      $('#fcKnew').onclick=()=>{knew++;const w=store.get('words',{m:[]});if(!w.m.includes(x.i))w.m.push(x.i);store.set('words',w);i++;card();};
      $('#fcLearn').onclick=()=>{i++;card();};
    };
  }
  card();
  function endFlash(){fa.style.display='none';$('#wordListArea').style.display='block';renderWordList();renderWordProgress();}
}
function initWords(){
  renderWordProgress();renderWordList();
  $('#wordSearch').oninput=renderWordList;
  $$('#wordFilters .chip').forEach(c=>c.onclick=()=>{wordFilter=c.dataset.wf;$$('#wordFilters .chip').forEach(x=>x.classList.toggle('on',x===c));renderWordList();});
  $('#startFlash').onclick=startFlashcards;
}

/* ================= MARKETS MODULE ================= */
const Markets={
  data:null,at:0,chart:null,
  async fetchAll(force){
    const since=Math.floor(Date.now()/1000)-8*86400;
    const jobs={
      gold:getJSON('https://api.gold-api.com/price/XAU','mk_xau',10,force),
      silver:getJSON('https://api.gold-api.com/price/XAG','mk_xag',10,force),
      fx:getJSON('https://api.frankfurter.dev/v1/latest?from=GBP&to=USD,EUR','mk_fx',60,force),
      btc:getJSON('https://api.kraken.com/0/public/OHLC?pair=XBTUSD&interval=1440&since='+since,'mk_btc',10,force),
      eth:getJSON('https://api.kraken.com/0/public/OHLC?pair=ETHUSD&interval=1440&since='+since,'mk_eth',10,force)
    };
    const out={};const errs=[];
    for(const k of Object.keys(jobs)){
      try{out[k]=(await jobs[k]).data;}catch(e){out[k]=null;errs.push(k);}
    }
    const parseK=d=>{
      if(!d||!d.result)return null;
      const key=Object.keys(d.result).find(x=>x!=='last');
      const c=(d.result[key]||[]);if(!c.length)return null;
      const closes=c.map(r=>+r[4]);const times=c.map(r=>r[0]*1000);
      const p=closes[closes.length-1];const prev=closes.length>1?closes[closes.length-2]:p;
      return{p,chg:prev?100*(p-prev)/prev:0,closes,times};
    };
    this.data={
      gold:out.gold?{p:out.gold.price,at:out.gold.updatedAt}:null,
      silver:out.silver?{p:out.silver.price}:null,
      fx:out.fx?{usd:out.fx.rates&&out.fx.rates.USD,eur:out.fx.rates&&out.fx.rates.EUR}:null,
      btc:parseK(out.btc),eth:parseK(out.eth),errs
    };
    this.at=Date.now();
    return this.data;
  },
  chgBadge(c){const up=c>=0;return '<span class="chg '+(up?'up':'down')+'">'+(up?'▲':'▼')+' '+Math.abs(c).toFixed(2)+'% today</span>';},
  async loadMini(){
    try{
      const d=this.data||await this.fetchAll(false);
      const gbp=d.fx&&d.fx.usd?1/d.fx.usd:null;
      const tiles=[];
      if(d.gold)tiles.push(['Gold /oz',fmtMoney(d.gold.p,'USD'),gbp?'≈ '+fmtMoney(d.gold.p*gbp,'GBP'):'']);
      if(d.btc)tiles.push(['Bitcoin',fmtMoney(d.btc.p,'USD'),this.chgBadge(d.btc.chg)]);
      if(d.fx&&d.fx.usd)tiles.push(['GBP → USD','$'+d.fx.usd.toFixed(4),'£1 buys $'+d.fx.usd.toFixed(2)]);
      if(d.eth)tiles.push(['Ethereum',fmtMoney(d.eth.p,'USD'),this.chgBadge(d.eth.chg)]);
      $('#miniMarkets').innerHTML=tiles.length?tiles.map(t=>'<div class="mini-tile"><div class="lbl">'+t[0]+'</div><div class="val">'+t[1]+'</div><div class="chg" style="color:var(--ink3);font-weight:600">'+t[2]+'</div></div>').join(''):'<p class="muted">Market data unavailable right now.</p>';
    }catch(e){$('#miniMarkets').innerHTML='<p class="muted">Market data unavailable ('+esc(e.message)+').</p>';}
  },
  async renderFull(force){
    const g=$('#mkGrid');
    if(force||!this.data){g.innerHTML='<div class="skel" style="height:110px"></div>'.repeat(6);try{await this.fetchAll(force);}catch(e){}}
    const d=this.data;
    if(!d){g.innerHTML='<div class="err" style="grid-column:1/-1"><span>Couldn’t load market data.</span><button class="btn small" onclick="Markets.renderFull(true)">Retry</button></div>';return;}
    const gbp=d.fx&&d.fx.usd?1/d.fx.usd:null;
    const cards=[];
    cards.push(d.gold?['Gold (XAU/oz)',fmtMoney(d.gold.p,'USD'),gbp?'≈ '+fmtMoney(d.gold.p*gbp,'GBP')+' per ounce':'','gold']:null);
    cards.push(d.silver?['Silver (XAG/oz)',fmtMoney(d.silver.p,'USD'),gbp?'≈ '+fmtMoney(d.silver.p*gbp,'GBP')+' per ounce':'','']:null);
    cards.push(d.btc?['Bitcoin (BTC)',fmtMoney(d.btc.p,'USD'),gbp?'≈ '+fmtMoney(d.btc.p*gbp,'GBP')+' per coin':'','btc',d.btc.chg]:null);
    cards.push(d.eth?['Ethereum (ETH)',fmtMoney(d.eth.p,'USD'),gbp?'≈ '+fmtMoney(d.eth.p*gbp,'GBP')+' per coin':'','eth',d.eth.chg]:null);
    if(d.fx&&d.fx.usd)cards.push(['Pound → Dollar','$'+d.fx.usd.toFixed(4),'£1 = $'+d.fx.usd.toFixed(4),'fx']);
    if(d.fx&&d.fx.eur)cards.push(['Pound → Euro','€'+d.fx.eur.toFixed(4),'£1 = €'+d.fx.eur.toFixed(4),'fx']);
    g.innerHTML=cards.filter(Boolean).map(c=>'<div class="mk-card"><div class="nm"><span>'+c[0]+'</span>'+(c.length>4?this.chgBadge(c[4]):'')+'</div><div class="px">'+c[1]+'</div><div class="sub2">'+c[2]+'</div></div>').join('')||'<p class="muted">No data.</p>';
    $('#mkUpdated').textContent='Updated '+new Date(this.at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})+(d.errs&&d.errs.length?' · some sources offline':'');
    this.ensureChart();
    this.loadMini();
  },
  ensureChart(){
    if(!this.data||!this.data.btc||typeof Chart==='undefined')return;
    if(!$('#view-markets').classList.contains('active'))return;
    const b=this.data.btc;
    const labels=b.times.map(t=>new Date(t).toLocaleDateString('en-GB',{day:'numeric',month:'short'}));
    $('#btcChartNote').textContent='Kraken daily closes';
    if(this.chart){this.chart.data.labels=labels;this.chart.data.datasets[0].data=b.closes;this.chart.update();return;}
    this.chart=new Chart($('#btcChart'),{type:'line',
      data:{labels,datasets:[{data:b.closes,borderColor:'#1d4ed8',backgroundColor:'rgba(29,78,216,.07)',fill:true,tension:.35,pointRadius:3,pointBackgroundColor:'#1d4ed8',borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' $'+Number(c.parsed.y).toLocaleString()}}},
      scales:{y:{grid:{color:'#eeebe2'},ticks:{callback:v=>'$'+Math.round(v/1000)+'k'}},x:{grid:{display:false}}}}});
  }
};
function initMarkets(){
  Markets.renderFull(false);
  $('#mkRefresh').onclick=()=>Markets.renderFull(true);
}

  try{initToday();}catch(e){toast('Something went wrong loading Today: '+e.message);}
}
boot();
